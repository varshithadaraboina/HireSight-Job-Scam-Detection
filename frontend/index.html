<!--Generate a complete HTML file for a job scam detection web application named HireSight with clean CSS styling and 
a responsive layout. 
Include three sections: Job Scam Checker (textarea + analyze button), Company Verification (input + button), 
and Report a Scam (multiple inputs + submit button). Use JavaScript with fetch API to connect to a backend 
at http://localhost:5000 with endpoints /analyze, /company/:name, and /report. Display risk score, risk level with colors (high, medium, low), 
reasons in a list, company status, and report submission response. Include proper error handling and dynamic result display sections.-->

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HireSight - Job Scam Detection</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #222;
    }

    .container {
      width: 90%;
      max-width: 900px;
      margin: 30px auto;
      background: #fff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #1d4ed8;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      color: #555;
      margin-bottom: 30px;
    }

    .section {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #ddd;
    }

    h2 {
      color: #111827;
      margin-bottom: 10px;
    }

    textarea,
    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 15px;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #1dd830;
    }

    .result {
      margin-top: 15px;
      padding: 15px;
      background: #f8fafc;
      border: 1px solid #dbeafe;
      border-radius: 8px;
      display: none;
    }

    .high {
      color: red;
      font-weight: bold;
    }

    .medium {
      color: orange;
      font-weight: bold;
    }

    .low {
      color: green;
      font-weight: bold;
    }

    ul {
      padding-left: 20px;
    }

    .footer {
      text-align: center;
      margin-top: 25px;
      color: #666;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>HireSight</h1>
    <p class="subtitle">Job Scam Detection Platform</p>

    <div class="section">
      <h2>1. Job Scam Checker</h2>
      <textarea id="jobText" placeholder="Paste the job description here..."></textarea>
      <button onclick="analyzeJob()">Analyze Job</button>
      <div id="analysisResult" class="result"></div>
    </div>

    <div class="section">
      <h2>2. Company Verification</h2>
      <input type="text" id="companyName" placeholder="Enter company name" />
      <button onclick="verifyCompany()">Check Company</button>
      <div id="companyResult" class="result"></div>
    </div>

    <div class="section">
      <h2>3. Report a Scam</h2>
      <input type="text" id="jobTitle" placeholder="Job Title" />
      <input type="text" id="reportCompanyName" placeholder="Company Name" />
      <textarea id="reportDescription" placeholder="Describe why this looks suspicious..."></textarea>
      <input type="text" id="evidence" placeholder="Evidence (optional)" />
      <button onclick="reportScam()">Submit Report</button>
      <div id="reportResult" class="result"></div>
    </div>

    <div class="footer">
      Stay safe while applying for jobs online.
    </div>
  </div>

  <script>
    const BASE_URL = "http://localhost:5000";

    async function analyzeJob() {
      const jobText = document.getElementById("jobText").value;
      const resultDiv = document.getElementById("analysisResult");

      if (!jobText.trim()) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p>Please enter a job description.</p>";
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/analyze`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ jobText })
        });

        const data = await response.json();

        let riskClass = "low";
        if (data.riskLevel === "High") riskClass = "high";
        else if (data.riskLevel === "Medium") riskClass = "medium";

        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
          <h3>Analysis Result</h3>
          <p><strong>Risk Score:</strong> ${data.riskScore}%</p>
          <p><strong>Risk Level:</strong> <span class="${riskClass}">${data.riskLevel}</span></p>
          <p><strong>Reasons:</strong></p>
          <ul>
            ${data.reasons.map(reason => `<li>${reason}</li>`).join("")}
          </ul>
        `;
      } catch (error) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p>Error connecting to backend.</p>";
      }
    }

    async function verifyCompany() {
      const companyName = document.getElementById("companyName").value;
      const resultDiv = document.getElementById("companyResult");

      if (!companyName.trim()) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p>Please enter a company name.</p>";
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/company/${encodeURIComponent(companyName)}`);
        const data = await response.json();

        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
          <h3>Company Verification Result</h3>
          <p><strong>Company:</strong> ${data.name}</p>
          <p><strong>Status:</strong> ${data.status}</p>
        `;
      } catch (error) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p>Error connecting to backend.</p>";
      }
    }

    async function reportScam() {
      const jobTitle = document.getElementById("jobTitle").value;
      const companyName = document.getElementById("reportCompanyName").value;
      const description = document.getElementById("reportDescription").value;
      const evidence = document.getElementById("evidence").value;
      const resultDiv = document.getElementById("reportResult");

      if (!jobTitle.trim() || !companyName.trim() || !description.trim()) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p>Please fill all required fields.</p>";
        return;
      }

      try {
        const response = await fetch(`${BASE_URL}/report`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ jobTitle, companyName, description, evidence })
        });

        const data = await response.json();

        resultDiv.style.display = "block";
        resultDiv.innerHTML = `
          <h3>Report Submitted</h3>
          <p>${data.message}</p>
          <p><strong>Report ID:</strong> ${data.report.id}</p>
        `;
      } catch (error) {
        resultDiv.style.display = "block";
        resultDiv.innerHTML = "<p>Error submitting report.</p>";
      }
    }
  </script>
</body>
</html>
